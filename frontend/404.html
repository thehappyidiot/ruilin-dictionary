<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Not Found — Our Dictionary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <header>
        <a href="/" class="site-title">Our Dictionary ✨</a>
        <form class="search-form" action="/search" method="get">
            <input
                class="search-input"
                type="search"
                name="q"
                placeholder="Search a word..."
                autocomplete="off"
            />
            <button class="search-btn" type="submit">Go!</button>
        </form>
    </header>

    <main>
        <div class="empty-state">
            <p class="empty-emoji">🫥</p>
            <p class="empty-text">That word doesn't exist... yet!</p>
            <a href="/random" class="random-btn">✦ Surprise me! ✦</a>
        </div>
    </main>
</body>
</html>
