<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — Our Dictionary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <header>
        <a href="/" class="site-title">Our Dictionary ✨</a>
    </header>

    <main>
        <div class="word-card">
            <div class="word-header">
                <h1 class="word-title">Admin Login</h1>
            </div>

            {{if .Error}}
            <section class="word-section">
                <p class="error-text">{{.Error}}</p>
            </section>
            {{end}}

            <form class="admin-form" action="/admin/login" method="post">
                <input type="hidden" name="csrf_token" value="{{.CSRFToken}}" />
                <label class="admin-label" for="password">Password</label>
                <input class="search-input admin-input" id="password" name="password" type="password" required autofocus />
                <button class="search-btn" type="submit">Log in</button>
            </form>
        </div>
    </main>
</body>
</html>
