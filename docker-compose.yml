services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ruilin_dictionary}
      POSTGRES_USER: ${POSTGRES_USER:-ruilin_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ruilin_user} -d ${POSTGRES_DB:-ruilin_dictionary}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    image: golang:1.25-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
    env_file:
      - .env
    environment:
      GOOSE_DRIVER: ${GOOSE_DRIVER:-postgres}
      GOOSE_MIGRATION_DIR: ${GOOSE_MIGRATION_DIR:-./sql/schema}
      GOOSE_DBSTRING: postgres://${POSTGRES_USER:-ruilin_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ruilin_dictionary}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    command:
      - sh
      - -c
      - >
        go run github.com/pressly/goose/v3/cmd/goose@latest
        -dir "$GOOSE_MIGRATION_DIR" "$GOOSE_DRIVER" "$GOOSE_DBSTRING" up

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8080}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${HOST_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/api/health | grep -q OK"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
